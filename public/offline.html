<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión - Apoyo Venezuela</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0c11;
        color: #e7eaf0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #9aa3b2;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      a {
        display: block;
        padding: 0.85rem 1rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid #2a2f3a;
        color: #e7eaf0;
        background: #11151c;
      }
      a.primary {
        background: #1f47df;
        border-color: #1f47df;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>
        No pudimos cargar el mapa en vivo. Los teléfonos de emergencia y la guía
        siguen disponibles sin conexión.
      </p>
      <div class="links">
        <a class="primary" href="/telefonos">Teléfonos de emergencia</a>
        <a href="/guia">Guía de ayuda</a>
        <a href="/">Reintentar</a>
      </div>
    </main>
  </body>
</html>
